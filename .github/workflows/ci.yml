---
name: CI
on:
  push:
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev deps
        run: pip install -r requirements-dev.txt
      - name: yamllint
        run: yamllint .
      - name: ansible-lint
        run: ansible-lint
      - name: syntax-check
        run: ansible-playbook --syntax-check site.yml
      - name: pytest
        run: pytest -v
